<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal finance manager</title>
<style>
:root{
  color-scheme: light;
  /* app chrome */
  --surface-0:#f9f9f7; --surface-1:#f4f4f2; --surface-2:#ffffff;
  --text-primary:#0b0b0b; --text-secondary:#52514e; --text-muted:#898781;
  --border:#e3e2dd; --border-strong:#c9c8c1; --radius:8px;
  --accent:#2a78d6; --bg-accent:#e6f1fb; --text-accent:#185fa5;
  /* viz chrome & ink */
  --viz-surface:#fcfcfb; --grid:#e1e0d9; --baseline:#c3c2b7; --muted-ink:#898781;
  /* series (validated: light) */
  --series-income:#2a78d6; --series-expense:#eb6834;
  --track:#cde2fb;
  /* status (fixed) */
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
  --delta-good:#006300; --delta-bad:#d03b3b;
}
@media (prefers-color-scheme: dark){
  :root:where(:not([data-theme="light"])){
    color-scheme: dark;
    --surface-0:#0d0d0d; --surface-1:#161615; --surface-2:#1f1f1e;
    --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#898781;
    --border:#2c2c2a; --border-strong:#44443f;
    --accent:#3987e5; --bg-accent:#12253c; --text-accent:#7ab1ef;
    --viz-surface:#1a1a19; --grid:#2c2c2a; --baseline:#383835;
    --series-income:#3987e5; --series-expense:#d95926;
    --track:#0d366b;
    --delta-good:#0ca30c;
  }
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --surface-0:#0d0d0d; --surface-1:#161615; --surface-2:#1f1f1e;
  --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#898781;
  --border:#2c2c2a; --border-strong:#44443f;
  --accent:#3987e5; --bg-accent:#12253c; --text-accent:#7ab1ef;
  --viz-surface:#1a1a19; --grid:#2c2c2a; --baseline:#383835;
  --series-income:#3987e5; --series-expense:#d95926;
  --track:#0d366b;
  --delta-good:#0ca30c;
}
*{box-sizing:border-box;}
body{
  margin:0; padding:1.5rem 1rem 4rem; background:var(--surface-0); color:var(--text-primary);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5; font-size:15px;
}
#root{max-width:860px; margin:0 auto;}
h1{font-size:1.35rem; margin:0;}
h2{font-size:1.05rem; margin:0 0 .75rem;}
h3{font-size:.95rem; margin:0 0 .5rem;}
p{margin:0 0 .5rem;}
button{
  font-family:inherit; font-size:14px; padding:7px 13px; border-radius:var(--radius);
  border:1px solid var(--border-strong); background:transparent; color:var(--text-primary); cursor:pointer;
}
button:hover{background:var(--surface-1);}
button:active{transform:scale(.98);}
button.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
button.primary:hover{filter:brightness(1.08); background:var(--accent);}
button.small{padding:3px 9px; font-size:12.5px;}
button.danger-ghost{color:var(--critical); border-color:var(--border);}
input,select{
  font-family:inherit; font-size:14px; padding:7px 10px; border-radius:var(--radius);
  border:1px solid var(--border-strong); background:var(--surface-2); color:var(--text-primary);
  min-width:0;
}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
label{font-size:12.5px; color:var(--text-secondary); display:block; margin-bottom:3px;}
.field{display:flex; flex-direction:column;}
.card{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:1rem 1.15rem; margin-bottom:1rem;}
.viz-card{background:var(--viz-surface);}
.rowline{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;}
.muted{color:var(--text-muted); font-size:13px;}
.hint{color:var(--text-muted); font-size:12.5px; margin-top:4px;}
.pill{display:inline-block; padding:2px 9px; border-radius:99px; font-size:12px; border:1px solid var(--border);}
.pill.income{background:var(--bg-accent); color:var(--text-accent); border-color:transparent;}
header.app{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:1rem; flex-wrap:wrap;}
nav.tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1.1rem;}
nav.tabs button{border:1px solid transparent; color:var(--text-secondary); background:transparent;}
nav.tabs button.active{background:var(--surface-2); border-color:var(--border-strong); color:var(--text-primary); font-weight:600;}
.tile-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:1rem;}
.tile{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:.8rem 1rem;}
.tile .label{font-size:12.5px; color:var(--text-secondary);}
.tile .value{font-size:1.45rem; font-weight:600; margin:2px 0;}
.tile.hero .value{font-size:2.1rem;}
.tile .delta{font-size:12.5px; font-weight:600;}
.delta.up{color:var(--delta-good);} .delta.down{color:var(--delta-bad);} .delta.flat{color:var(--text-muted); font-weight:400;}
.form-grid{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
.form-grid .field{flex:1 1 120px;}
table.data{width:100%; border-collapse:collapse; font-size:13.5px;}
table.data th{text-align:left; color:var(--text-secondary); font-weight:500; font-size:12.5px; padding:5px 8px; border-bottom:1px solid var(--border);}
table.data td{padding:6px 8px; border-bottom:1px solid var(--border);}
table.data td.num, table.data th.num{text-align:right; font-variant-numeric:tabular-nums;}
table.data tr:last-child td{border-bottom:none;}
.amount.pos{color:var(--delta-good); font-weight:600;}
.amount.neg{font-weight:600;}
.chart-wrap{position:relative;}
.chart-wrap svg{display:block; width:100%; height:auto;}
.legend{display:flex; gap:16px; align-items:center; margin-bottom:6px; font-size:13px; color:var(--text-secondary);}
.legend .key{display:inline-flex; align-items:center; gap:6px;}
.swatch{width:12px; height:12px; border-radius:3px; display:inline-block;}
.linekey{width:14px; height:3px; border-radius:2px; display:inline-block;}
.tooltip{
  position:absolute; pointer-events:none; z-index:5; display:none;
  background:var(--surface-2); border:1px solid var(--border-strong); border-radius:8px;
  padding:7px 10px; font-size:12.5px; box-shadow:0 4px 14px rgba(0,0,0,.14); min-width:130px;
}
.tooltip .t-title{color:var(--text-secondary); margin-bottom:4px;}
.tooltip .t-row{display:flex; align-items:center; gap:7px; justify-content:space-between; padding:1px 0;}
.tooltip .t-row .name{color:var(--text-secondary);}
.tooltip .t-row .val{font-weight:700; color:var(--text-primary);}
details.tableview{margin-top:8px;}
details.tableview summary{cursor:pointer; font-size:12.5px; color:var(--text-secondary);}
.meter{height:10px; background:var(--track); border-radius:5px; overflow:hidden; margin:6px 0 4px;}
.meter > div{height:100%; border-radius:5px 0 0 5px;}
.status{font-size:12.5px; color:var(--text-secondary); display:inline-flex; align-items:center; gap:5px;}
.status .ic{font-weight:700;}
.hbar-row{display:grid; grid-template-columns:110px 1fr; gap:10px; align-items:center; margin:7px 0; font-size:13px;}
.hbar-label{color:var(--text-secondary); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.hbar-track{display:flex; align-items:center; gap:8px;}
.hbar{height:14px; border-radius:0 4px 4px 0; background:var(--series-income); min-width:2px;}
.hbar-val{font-size:12.5px; color:var(--text-secondary); font-variant-numeric:tabular-nums; white-space:nowrap;}
.calc-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:12px;}
.calc-grid .card{margin-bottom:0;}
.result-rows{margin-top:10px; border-top:1px solid var(--border); padding-top:8px;}
.result-rows .r{display:flex; justify-content:space-between; gap:10px; padding:3px 0; font-size:13.5px;}
.result-rows .r .k{color:var(--text-secondary);}
.result-rows .r .v{font-weight:600; font-variant-numeric:tabular-nums;}
.result-rows .r.big .v{font-size:1.2rem; color:var(--text-accent);}
.empty{padding:2.2rem 1rem; text-align:center; color:var(--text-muted);}
.empty .big{font-size:1rem; color:var(--text-secondary); margin-bottom:8px;}
.filters{display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; margin-bottom:.85rem;}
.tx-badge{font-size:11.5px; padding:1px 7px; border-radius:99px; border:1px solid var(--border);}
.callout{border-left:3px solid var(--warning); background:var(--surface-1); padding:8px 12px; border-radius:0 8px 8px 0; font-size:13.5px; margin-top:8px;}
.callout.crit{border-left-color:var(--critical);}
.callout.ok{border-left-color:var(--good);}
@media (max-width:560px){ .hbar-row{grid-template-columns:84px 1fr;} }
</style>
</head>
<body>
<div id="root">
  <header class="app">
    <div>
      <h1>Personal finance manager</h1>
      <div class="muted">Track, budget, calculate and forecast — data stays in this browser.</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <select id="currency-sel" title="Currency" aria-label="Currency"></select>
      <button id="reset-btn" class="danger-ghost small" title="Erase all saved data">Reset data</button>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>
</div>

<script>
'use strict';
/* ============================== state ============================== */
const LS_KEY = 'smarterfinance-v1';
const CATS = {
  income: ['Salary','Freelance','Investments','Gifts','Other income'],
  expense: ['Housing','Utilities','Groceries','Transport','Dining out','Entertainment','Health','Shopping','Education','Subscriptions','Travel','Other']
};
const CURRENCIES = ['USD','EUR','GBP','JPY','INR','CAD','AUD','CHF','SEK','BRL'];
const TABS = [
  ['dashboard','Dashboard'],
  ['transactions','Transactions'],
  ['budgets','Budgets'],
  ['calculators','Calculators'],
  ['forecast','Forecast']
];

let state = load();
let activeTab = 'dashboard';
let editingTxId = null;

function blankState(){
  return { tx: [], budgets: {}, recurring: [], settings: { currency: 'USD' } };
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return blankState();
    const s = JSON.parse(raw);
    return Object.assign(blankState(), s, { settings: Object.assign({currency:'USD'}, s.settings) });
  }catch(e){ return blankState(); }
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ============================== utils ============================== */
function fmt(n, maxFrac){
  return new Intl.NumberFormat('en-US', { style:'currency', currency: state.settings.currency,
    maximumFractionDigits: maxFrac===undefined?2:maxFrac }).format(n);
}
function fmt0(n){ return fmt(n, 0); }
function fmtNum(n){ return Math.round(n).toLocaleString('en-US'); }
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function monthKey(dateStr){ return dateStr.slice(0,7); }
function curMonthKey(){ return todayISO().slice(0,7); }
function shiftMonth(key, delta){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthLabel(key, withYear){
  const [y,m] = key.split('-').map(Number);
  return MONTH_NAMES[m-1] + (withYear ? ' ' + y : '');
}
function monthLabelFull(key){ return monthLabel(key, true); }

/* DOM builder — user-entered strings only ever land via textContent */
function h(tag, props, ...children){
  const e = document.createElement(tag);
  if(props) for(const [k,v] of Object.entries(props)){
    if(k==='class') e.className = v;
    else if(k==='dataset') Object.assign(e.dataset, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if(k==='style') e.style.cssText = v;
    else if(v !== false && v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for(const c of children.flat()){
    if(c === null || c === undefined || c === false) continue;
    e.append(c.nodeType ? c : document.createTextNode(c));
  }
  return e;
}
const SVG_NS = 'http://www.w3.org/2000/svg';
function s(tag, attrs, ...children){
  const e = document.createElementNS(SVG_NS, tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(k==='style') e.setAttribute('style', v);
    else e.setAttribute(k, v);
  }
  for(const c of children.flat()){
    if(c === null || c === undefined || c === false) continue;
    e.append(c.nodeType ? c : document.createTextNode(c));
  }
  return e;
}

function niceStep(x){
  if(x<=0) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(x)));
  const f = x/p;
  return (f<=1?1:f<=2?2:f<=5?5:10)*p;
}
function axisScale(minV, maxV, tickCount){
  if(minV===maxV){ maxV = minV + 1; }
  const step = niceStep((maxV-minV)/tickCount);
  const lo = Math.floor(minV/step)*step;
  const hi = Math.ceil(maxV/step)*step;
  const ticks = [];
  for(let t=lo; t<=hi+step*0.001; t+=step) ticks.push(Math.round(t*100)/100);
  return { lo, hi, ticks };
}

/* ============================== aggregation ============================== */
function txSorted(){ return [...state.tx].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0); }
function sumBy(list, pred){ let t=0; for(const x of list) if(pred(x)) t+=x.amount; return t; }
function monthTotals(key){
  const inMonth = state.tx.filter(t=>monthKey(t.date)===key);
  return {
    income: sumBy(inMonth, t=>t.type==='income'),
    expense: sumBy(inMonth, t=>t.type==='expense')
  };
}
function allTimeBalance(){
  return sumBy(state.tx, t=>t.type==='income') - sumBy(state.tx, t=>t.type==='expense');
}
function expensesByCategory(key){
  const map = new Map();
  for(const t of state.tx){
    if(t.type!=='expense' || monthKey(t.date)!==key) continue;
    map.set(t.category, (map.get(t.category)||0) + t.amount);
  }
  return [...map.entries()].sort((a,b)=>b[1]-a[1]);
}
function lastNMonthKeys(n){
  const keys = [];
  let k = curMonthKey();
  for(let i=n-1;i>=0;i--) keys.push(shiftMonth(k, -i));
  return keys;
}
function avgMonthlyExpense(nMonths){
  const keys = [];
  for(let i=1;i<=nMonths;i++) keys.push(shiftMonth(curMonthKey(), -i));
  const withData = keys.filter(k=>state.tx.some(t=>monthKey(t.date)===k));
  if(!withData.length) return 0;
  const total = withData.reduce((acc,k)=>acc+monthTotals(k).expense, 0);
  return total/withData.length;
}

/* ============================== charts ============================== */
function makeTooltip(wrap){
  const tip = h('div',{class:'tooltip'});
  wrap.append(tip);
  return {
    show(rows, title, cx, cy){
      tip.replaceChildren();
      if(title) tip.append(h('div',{class:'t-title'}, title));
      for(const r of rows){
        tip.append(h('div',{class:'t-row'},
          h('span',{class:'name', style:'display:inline-flex;align-items:center;gap:6px;'},
            r.color ? h('span',{class:'linekey', style:'background:'+r.color}) : null, r.name),
          h('span',{class:'val'}, r.value)));
      }
      tip.style.display = 'block';
      const wr = wrap.getBoundingClientRect();
      const tw = tip.offsetWidth, th = tip.offsetHeight;
      let x = cx + 14, y = cy - th - 10;
      if(x + tw > wr.width - 4) x = cx - tw - 14;
      if(x < 4) x = 4;
      if(y < 4) y = cy + 14;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    },
    hide(){ tip.style.display='none'; }
  };
}
function svgPoint(svg, evt){
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function wrapPoint(wrap, evt){
  const r = wrap.getBoundingClientRect();
  return { x: evt.clientX - r.left, y: evt.clientY - r.top };
}
function barPath(x, y, w, hgt, r){
  if(hgt <= 0.5) return 'M'+x+' '+(y+hgt)+' h'+w+' v-'+Math.max(hgt,0.5)+' h-'+w+' Z';
  r = Math.min(r, w/2, hgt);
  return 'M'+x+' '+(y+hgt)
    + ' L'+x+' '+(y+r)
    + ' Q'+x+' '+y+' '+(x+r)+' '+y
    + ' L'+(x+w-r)+' '+y
    + ' Q'+(x+w)+' '+y+' '+(x+w)+' '+(y+r)
    + ' L'+(x+w)+' '+(y+hgt) + ' Z';
}

/* Grouped bar chart: income vs expense per month */
function groupedBarChart(months){ // [{key,label,income,expense}]
  const W=720, H=250, mL=56, mR=10, mT=10, mB=26;
  const plotW = W-mL-mR, plotH = H-mT-mB;
  const maxV = Math.max(1, ...months.map(m=>Math.max(m.income, m.expense)));
  const sc = axisScale(0, maxV*1.05, 4);
  const yOf = v => mT + plotH - (v - sc.lo)/(sc.hi - sc.lo)*plotH;

  const svg = s('svg', { viewBox:'0 0 '+W+' '+H, role:'img',
    'aria-label':'Monthly income and spending, grouped bar chart' });

  for(const t of sc.ticks){
    const y = yOf(t);
    svg.append(s('line',{x1:mL, x2:W-mR, y1:y, y2:y, style:'stroke:var(--grid);stroke-width:1'}));
    svg.append(s('text',{x:mL-8, y:y+4, 'text-anchor':'end',
      style:'fill:var(--muted-ink);font-size:11px;font-variant-numeric:tabular-nums;'}, fmtNum(t)));
  }
  svg.append(s('line',{x1:mL, x2:W-mR, y1:yOf(0), y2:yOf(0), style:'stroke:var(--baseline);stroke-width:1'}));

  const band = plotW/months.length;
  const barW = Math.min(24, band*0.26);
  const gap = 2;
  const groups = [];
  months.forEach((m,i)=>{
    const cx = mL + band*i + band/2;
    const xInc = cx - barW - gap/2;
    const xExp = cx + gap/2;
    const g = s('g');
    const incBar = s('path',{d:barPath(xInc, yOf(m.income), barW, yOf(0)-yOf(m.income), 4),
      style:'fill:var(--series-income)'});
    const expBar = s('path',{d:barPath(xExp, yOf(m.expense), barW, yOf(0)-yOf(m.expense), 4),
      style:'fill:var(--series-expense)'});
    g.append(incBar, expBar);
    svg.append(g);
    svg.append(s('text',{x:cx, y:H-8, 'text-anchor':'middle',
      style:'fill:var(--muted-ink);font-size:11px;'}, m.label));
    groups.push({m, g, cx});
  });

  const wrap = h('div',{class:'chart-wrap'});
  wrap.append(svg);
  const tip = makeTooltip(wrap);

  // per-band hit targets (bigger than the marks); tooltip lists every series at that X
  groups.forEach(({m,g,cx})=>{
    const hit = s('rect',{x:cx-band/2, y:mT, width:band, height:plotH+mB, fill:'transparent'});
    hit.addEventListener('pointermove', evt=>{
      g.setAttribute('opacity','0.82');
      const p = wrapPoint(wrap, evt);
      const css = getComputedStyle(document.documentElement);
      tip.show([
        {name:'Income', value:fmt0(m.income), color:css.getPropertyValue('--series-income').trim()},
        {name:'Spending', value:fmt0(m.expense), color:css.getPropertyValue('--series-expense').trim()},
        {name:'Net', value:fmt0(m.income - m.expense)}
      ], monthLabelFull(m.key), p.x, p.y);
    });
    hit.addEventListener('pointerleave', ()=>{ g.removeAttribute('opacity'); tip.hide(); });
    svg.append(hit);
  });

  const css = getComputedStyle(document.documentElement);
  const legend = h('div',{class:'legend'},
    h('span',{class:'key'}, h('span',{class:'swatch', style:'background:var(--series-income)'}), 'Income'),
    h('span',{class:'key'}, h('span',{class:'swatch', style:'background:var(--series-expense)'}), 'Spending'));

  const table = h('details',{class:'tableview'},
    h('summary',{}, 'View data as table'),
    h('table',{class:'data'},
      h('thead',{}, h('tr',{}, h('th',{},'Month'), h('th',{class:'num'},'Income'),
        h('th',{class:'num'},'Spending'), h('th',{class:'num'},'Net'))),
      h('tbody',{}, months.map(m=> h('tr',{},
        h('td',{}, monthLabelFull(m.key)),
        h('td',{class:'num'}, fmt0(m.income)),
        h('td',{class:'num'}, fmt0(m.expense)),
        h('td',{class:'num'}, fmt0(m.income - m.expense)))))));

  return h('div',{}, legend, wrap, table);
}

/* Line chart with area wash, crosshair + tooltip: projected balance */
function lineChart(points, seriesName){ // [{label, value}]
  const W=720, H=260, mL=64, mR=64, mT=12, mB=26;
  const plotW = W-mL-mR, plotH = H-mT-mB;
  const vals = points.map(p=>p.value);
  const sc = axisScale(Math.min(0, ...vals), Math.max(0, ...vals), 4);
  const yOf = v => mT + plotH - (v - sc.lo)/(sc.hi - sc.lo)*plotH;
  const xOf = i => points.length===1 ? mL+plotW/2 : mL + plotW*i/(points.length-1);

  const svg = s('svg',{viewBox:'0 0 '+W+' '+H, role:'img', 'aria-label': seriesName+' line chart'});

  for(const t of sc.ticks){
    const y = yOf(t);
    svg.append(s('line',{x1:mL, x2:W-mR, y1:y, y2:y, style:'stroke:var(--grid);stroke-width:1'}));
    svg.append(s('text',{x:mL-8, y:y+4, 'text-anchor':'end',
      style:'fill:var(--muted-ink);font-size:11px;font-variant-numeric:tabular-nums;'}, fmtNum(t)));
  }
  if(sc.lo < 0) svg.append(s('line',{x1:mL, x2:W-mR, y1:yOf(0), y2:yOf(0),
    style:'stroke:var(--baseline);stroke-width:1'}));

  // x labels — thin to <= 8 to avoid collisions
  const every = Math.max(1, Math.ceil(points.length/8));
  points.forEach((p,i)=>{
    if(i%every===0 || i===points.length-1)
      svg.append(s('text',{x:xOf(i), y:H-8, 'text-anchor':'middle',
        style:'fill:var(--muted-ink);font-size:11px;'}, p.label));
  });

  const lineD = points.map((p,i)=>(i?'L':'M')+xOf(i)+' '+yOf(p.value)).join(' ');
  const zeroY = yOf(Math.max(sc.lo, 0));
  const areaD = lineD + ' L'+xOf(points.length-1)+' '+zeroY+' L'+xOf(0)+' '+zeroY+' Z';
  svg.append(s('path',{d:areaD, style:'fill:var(--series-income);fill-opacity:.1'}));
  svg.append(s('path',{d:lineD, style:'stroke:var(--series-income);stroke-width:2;fill:none;stroke-linejoin:round;stroke-linecap:round;'}));

  // end marker with surface ring + end label
  const li = points.length-1;
  svg.append(s('circle',{cx:xOf(li), cy:yOf(points[li].value), r:4.5,
    style:'fill:var(--series-income);stroke:var(--viz-surface);stroke-width:2'}));
  svg.append(s('text',{x:xOf(li)+8, y:yOf(points[li].value)+4,
    style:'fill:var(--text-primary);font-size:12px;font-weight:600;'}, fmt0(points[li].value)));

  // crosshair + hover dot
  const cross = s('line',{y1:mT, y2:mT+plotH, style:'stroke:var(--baseline);stroke-width:1', visibility:'hidden'});
  const hoverDot = s('circle',{r:4.5, visibility:'hidden',
    style:'fill:var(--series-income);stroke:var(--viz-surface);stroke-width:2'});
  svg.append(cross, hoverDot);

  const wrap = h('div',{class:'chart-wrap'});
  wrap.append(svg);
  const tip = makeTooltip(wrap);
  const css = ()=>getComputedStyle(document.documentElement).getPropertyValue('--series-income').trim();

  svg.addEventListener('pointermove', evt=>{
    const loc = svgPoint(svg, evt);
    let best=0, bd=Infinity;
    for(let i=0;i<points.length;i++){
      const d = Math.abs(xOf(i)-loc.x);
      if(d<bd){ bd=d; best=i; }
    }
    const px = xOf(best), py = yOf(points[best].value);
    cross.setAttribute('x1', px); cross.setAttribute('x2', px);
    cross.setAttribute('visibility','visible');
    hoverDot.setAttribute('cx', px); hoverDot.setAttribute('cy', py);
    hoverDot.setAttribute('visibility','visible');
    const p = wrapPoint(wrap, evt);
    tip.show([{name:seriesName, value:fmt0(points[best].value), color:css()}], points[best].label, p.x, p.y);
  });
  svg.addEventListener('pointerleave', ()=>{
    cross.setAttribute('visibility','hidden');
    hoverDot.setAttribute('visibility','hidden');
    tip.hide();
  });

  const table = h('details',{class:'tableview'},
    h('summary',{}, 'View data as table'),
    h('table',{class:'data'},
      h('thead',{}, h('tr',{}, h('th',{},'Month'), h('th',{class:'num'}, seriesName))),
      h('tbody',{}, points.map(p=> h('tr',{}, h('td',{},p.label), h('td',{class:'num'}, fmt0(p.value)))))));

  return h('div',{}, wrap, table);
}

/* Horizontal category bars — single measure, single hue, value at the tip */
function categoryBars(entries){ // [[name, value]]
  const max = Math.max(1, ...entries.map(e=>e[1]));
  return h('div',{}, entries.map(([name,val])=>
    h('div',{class:'hbar-row'},
      h('div',{class:'hbar-label', title:name}, name),
      h('div',{class:'hbar-track'},
        h('div',{class:'hbar', style:'width:'+Math.max(1,(val/max*100)).toFixed(1)+'%'}),
        h('span',{class:'hbar-val'}, fmt0(val))))));
}

/* ============================== tiles ============================== */
function deltaEl(delta, upIsGood, vsLabel){
  if(delta === null) return h('div',{class:'delta flat'}, '—');
  const up = delta > 0.005, down = delta < -0.005;
  const good = up ? upIsGood : down ? !upIsGood : null;
  const cls = good===null ? 'flat' : good ? 'up' : 'down';
  const arrow = up ? '▲ ' : down ? '▼ ' : '';
  return h('div',{class:'delta '+cls}, arrow + fmt0(Math.abs(delta)) + ' vs ' + vsLabel);
}
function tile(label, value, extra, hero){
  return h('div',{class:'tile'+(hero?' hero':'')},
    h('div',{class:'label'}, label),
    h('div',{class:'value'}, value),
    extra || null);
}

let txFilters = { month:'all', type:'all', q:'' };
function viewTransactions(root){
  const editing = editingTxId ? state.tx.find(t=>t.id===editingTxId) : null;

  const typeSel = h('select',{id:'tx-type'},

  }

  typeSel.value = editing ? editing.type : 'expense';

  const amount = h('input',{id:'tx-amount', type:'number', step:'0.01', min:'0.01',
    placeholder:'0.00', value: editing ? editing.amount : ''});

      h('div',{class:'field', style:'flex:2 1 160px;'}, h('label',{for:'tx-desc'},'Description'), desc),
      h('button',{class:'primary', type:'submit'}, editing ? 'Save changes' : 'Add'),
      editing ? h('button',{type:'button', onclick:()=>{editingTxId=null; render();}},'Cancel') : null));
  root.append(form);

  if(!state.tx.length){ root.append(emptyState('No transactions yet.')); return; }

    h('option',{value:'all'},'All months'),

  const ftype = h('select',{onchange:e=>{txFilters.type=e.target.value; render();}},
    h('option',{value:'all'},'Income + expenses'),
    h('option',{value:'income'},'Income only'),
    h('option',{value:'expense'},'Expenses only'));
  ftype.value = txFilters.type;
  const q = h('input',{type:'search', placeholder:'Search description/category',

    }});

  const listHolder = h('div',{});
  function filtered(){
    const needle = txFilters.q.trim().toLowerCase();
    return txSorted().filter(t=>
      (txFilters.month==='all' || monthKey(t.date)===txFilters.month) &&
      (txFilters.type==='all' || t.type===txFilters.type) &&

  renderTxList();

  root.append(h('div',{class:'card'},
    h('div',{class:'filters'},
      h('div',{class:'field'}, h('label',{},'Month'), monthSel),
      h('div',{class:'field'}, h('label',{},'Type'), ftype),
      h('div',{class:'field', style:'flex:1 1 180px;'}, h('label',{},'Search'), q)),

let budgetMonth = null;
function viewBudgets(root){
  if(!budgetMonth) budgetMonth = curMonthKey();
  const monthsAvail = [...new Set(state.tx.map(t=>monthKey(t.date)).concat([curMonthKey()]))].sort().reverse();
  const monthSel = h('select',{onchange:e=>{budgetMonth=e.target.value; render();}},
    monthsAvail.map(k=>h('option',{value:k}, monthLabelFull(k))));
  monthSel.value = budgetMonth;

  const unbudgeted = CATS.expense.filter(c=>!(c in state.budgets));
  const addCat = h('select',{}, unbudgeted.map(c=>h('option',{value:c},c)));
  const addAmt = h('input',{type:'number', min:'1', step:'1', placeholder:'monthly limit', style:'width:130px;'});
  const addForm = h('form',{class:'form-grid', onsubmit:e=>{
      e.preventDefault();
      const v = parseFloat(addAmt.value);
      if(!(v>0) || !addCat.value) return;
      state.budgets[addCat.value] = Math.round(v*100)/100;
      save(); render();
    }},
    h('div',{class:'field'}, h('label',{},'Category'), addCat),
    h('div',{class:'field'}, h('label',{},'Monthly limit'), addAmt),
    h('button',{class:'primary', type:'submit'},'Set budget'));

  root.append(h('div',{class:'card'},
    h('div',{class:'rowline'},
      h('h2',{},'Monthly budgets'),
      h('div',{class:'field'}, h('label',{},'Showing'), monthSel)),
    h('p',{class:'muted'},'Set a monthly limit per spending category. Progress compares the limit with what you actually spent that month.'),
    unbudgeted.length ? addForm : h('div',{class:'muted'},'Every category has a budget.')));

  const entries = Object.entries(state.budgets);
  if(!entries.length){
    root.append(h('div',{class:'card'}, h('div',{class:'empty'},
      h('div',{class:'big'},'No budgets set yet.'),
      h('p',{},'Pick a category above and give it a monthly limit.'))));
    return;
  }

  const spentBy = new Map(expensesByCategory(budgetMonth));
  let totalBudget = 0, totalSpent = 0;
  const cards = entries.sort((a,b)=>a[0].localeCompare(b[0])).map(([cat, limit])=>{
    const spent = spentBy.get(cat)||0;
    totalBudget += limit; totalSpent += spent;
    return budgetRow(cat, spent, limit, true);
  });

  const wrap = h('div',{class:'card'});
  wrap.append(h('h2',{},'Budget status — '+monthLabelFull(budgetMonth)));
  wrap.append(budgetRow('All budgeted categories', totalSpent, totalBudget, false));
  wrap.append(h('div',{style:'border-top:1px solid var(--border); margin:10px 0;'}));
  cards.forEach(c=>wrap.append(c));
  root.append(wrap);
}
function budgetRow(cat, spent, limit, removable){
  const ratio = limit>0 ? spent/limit : 0;
  const pct = Math.min(100, ratio*100);
  let fill, ic, txt;
  if(ratio > 1){ fill='var(--critical)'; ic='!'; txt='Over budget by '+fmt0(spent-limit); }
  else if(ratio >= 0.75){ fill='var(--warning)'; ic='⚠'; txt='Close to limit · '+fmt0(limit-spent)+' left'; }
  else { fill='var(--accent)'; ic='✓'; txt='On track · '+fmt0(limit-spent)+' left'; }
  return h('div',{style:'margin:10px 0;'},
    h('div',{class:'rowline'},
      h('strong',{style:'font-size:13.5px;'}, cat),
      h('span',{style:'font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums;'},
        fmt0(spent)+' of '+fmt0(limit),
        removable ? h('button',{class:'small', style:'margin-left:10px;',
          onclick:()=>{ if(confirm('Remove the '+cat+' budget?')){ delete state.budgets[cat]; save(); render(); } }},'Remove') : '')),
    h('div',{class:'meter'}, h('div',{style:'width:'+pct+'%;background:'+fill})),
    h('span',{class:'status'}, h('span',{class:'ic', style:'color:'+fill}, ic), txt));
}

function numField(labelTxt, val, attrs){

function resultRows(){
  const box = h('div',{class:'result-rows'});
  return [box, (rows)=>{
    box.replaceChildren(...rows.map(([k,v,big])=>
      h('div',{class:'r'+(big?' big':'')}, h('span',{class:'k'},k), h('span',{class:'v'},v))));

function loanCalc(){
  const [fA,a] = numField('Loan amount', 25000, {min:0, step:100});
  const [fR,r] = numField('Annual rate (%)', 6.5, {min:0, step:0.05});
  const [fY,y] = numField('Term (years)', 5, {min:0.5, step:0.5});
  const [box, setRows] = resultRows();
  function calc(){
    const P = parseFloat(a.value)||0, apr = (parseFloat(r.value)||0)/100, yrs = parseFloat(y.value)||0;
    const n = Math.round(yrs*12), i = apr/12;
    if(P<=0 || n<=0){ setRows([['Enter a loan amount and term','']]); return; }
    const pay = i===0 ? P/n : P*i/(1-Math.pow(1+i,-n));
    setRows([
      ['Monthly payment', fmt(pay), true],
      ['Number of payments', String(n)],
      ['Total paid', fmt0(pay*n)],
      ['Total interest', fmt0(pay*n - P)]]);
  }
  [a,r,y].forEach(x=>x.addEventListener('input', calc)); calc();
  return h('div',{class:'card'}, h('h3',{},'Loan / mortgage payment'),
    h('div',{class:'form-grid'}, fA, fR, fY), box);
}
function savingsCalc(){
  const [fP,p] = numField('Starting amount', 1000, {min:0, step:100});
  const [fC,c] = numField('Monthly contribution', 250, {min:0, step:10});
  const [fR,r] = numField('Annual return (%)', 5, {min:0, step:0.1});
  const [fY,y] = numField('Years', 10, {min:1, step:1});
  const [box, setRows] = resultRows();
  function calc(){
    const P = parseFloat(p.value)||0, C = parseFloat(c.value)||0;
    const apr = (parseFloat(r.value)||0)/100, n = Math.round((parseFloat(y.value)||0)*12), i = apr/12;
    if(n<=0){ setRows([['Enter a number of years','']]); return; }
    const fv = i===0 ? P + C*n : P*Math.pow(1+i,n) + C*((Math.pow(1+i,n)-1)/i);
    const contrib = P + C*n;
    setRows([
      ['Future value', fmt0(fv), true],
      ['Total contributed', fmt0(contrib)],
      ['Growth earned', fmt0(fv-contrib)]]);
  }
  [p,c,r,y].forEach(x=>x.addEventListener('input', calc)); calc();
  return h('div',{class:'card'}, h('h3',{},'Savings & compound growth'),
    h('div',{class:'form-grid'}, fP, fC, fR, fY), box);
}
function payoffCalc(){
  const [fB,b] = numField('Current balance', 4000, {min:0, step:50});
  const [fR,r] = numField('APR (%)', 21.9, {min:0, step:0.1});
  const [fP,p] = numField('Monthly payment', 200, {min:0, step:10});
  const [box, setRows] = resultRows();
  function calc(){
    const B = parseFloat(b.value)||0, apr = (parseFloat(r.value)||0)/100, pay = parseFloat(p.value)||0;
    const i = apr/12;
    if(B<=0 || pay<=0){ setRows([['Enter a balance and payment','']]); return; }
    if(i>0 && pay <= B*i){
      setRows([['Payment too small', 'covers less than the '+fmt(B*i)+' monthly interest — the balance never shrinks', true]]);
      return;
    }
    const n = i===0 ? Math.ceil(B/pay) : Math.ceil(-Math.log(1-i*B/pay)/Math.log(1+i));
    const total = i===0 ? B : (()=>{ // simulate for exact interest incl. final partial payment
      let bal=B, paid=0;
      for(let k=0;k<n;k++){ bal += bal*i; const pmt=Math.min(pay,bal); bal-=pmt; paid+=pmt; }
      return paid;
    })();
    const done = new Date(); done.setMonth(done.getMonth()+n);
    setRows([
      ['Debt-free in', n+' month'+(n===1?'':'s'), true],
      ['Payoff date', MONTH_NAMES[done.getMonth()]+' '+done.getFullYear()],
      ['Total paid', fmt0(total)],
      ['Total interest', fmt0(total-B)]]);
  }
  [b,r,p].forEach(x=>x.addEventListener('input', calc)); calc();
  return h('div',{class:'card'}, h('h3',{},'Debt payoff'),
    h('div',{class:'form-grid'}, fB, fR, fP), box);
}
function goalCalc(){
  const [fT,t] = numField('Target amount', 20000, {min:0, step:500});
  const [fS,sv] = numField('Already saved', 2000, {min:0, step:100});
  const [fY,y] = numField('Years to goal', 4, {min:0.5, step:0.5});
  const [fR,r] = numField('Annual return (%)', 4, {min:0, step:0.1});
  const [box, setRows] = resultRows();
  function calc(){
    const T = parseFloat(t.value)||0, P = parseFloat(sv.value)||0;
    const apr = (parseFloat(r.value)||0)/100, n = Math.round((parseFloat(y.value)||0)*12), i = apr/12;
    if(T<=0 || n<=0){ setRows([['Enter a target and timeframe','']]); return; }
    const growth = Math.pow(1+i, n);
    const fromStart = P*growth;
    if(fromStart >= T){ setRows([['Required monthly saving', fmt(0), true],
      ['Your current savings alone grow to', fmt0(fromStart)]]); return; }
    const c = i===0 ? (T-P)/n : (T - fromStart)*i/(growth-1);
    setRows([
      ['Required monthly saving', fmt(c), true],
      ['Months of saving', String(n)],
      ['You contribute', fmt0(P + c*n)],
      ['Growth covers', fmt0(T - (P + c*n))]]);
  }
  [t,sv,y,r].forEach(x=>x.addEventListener('input', calc)); calc();
  return h('div',{class:'card'}, h('h3',{},'Savings goal'),
    h('div',{class:'form-grid'}, fT, fS, fY, fR), box);
}

let fcOpts = { horizon: 12, startOverride: null, variableOverride: null };
function viewForecast(root){
  // --- recurring manager
  const rName = h('input',{type:'text', placeholder:'e.g. Rent', maxlength:'40'});
  const rType = h('select',{}, h('option',{value:'income'},'Income'), h('option',{value:'expense'},'Expense'));
  const rAmt = h('input',{type:'number', min:'0.01', step:'0.01', placeholder:'per month'});
  const addRec = h('form',{class:'form-grid', onsubmit:e=>{
      e.preventDefault();
      const amt = parseFloat(rAmt.value);
      if(!(amt>0) || !rName.value.trim()) return;
      state.recurring.push({id:uid(), name:rName.value.trim(), type:rType.value, amount:Math.round(amt*100)/100});
      save(); render();
    }},
    h('div',{class:'field', style:'flex:1.4 1 140px;'}, h('label',{},'Name'), rName),
    h('div',{class:'field'}, h('label',{},'Type'), rType),
    h('div',{class:'field'}, h('label',{},'Amount / month'), rAmt),
    h('button',{class:'primary', type:'submit'},'Add'));

  const recIncome = sumBy(state.recurring, x=>x.type==='income');
  const recExpense = sumBy(state.recurring, x=>x.type==='expense');

  const recList = state.recurring.length
    ? h('table',{class:'data'},
        h('thead',{}, h('tr',{}, h('th',{},'Name'), h('th',{},'Type'), h('th',{class:'num'},'Monthly'), h('th',{},''))),
        h('tbody',{}, state.recurring.map(x=> h('tr',{},
          h('td',{}, x.name),
          h('td',{}, h('span',{class:'tx-badge'}, x.type)),
          h('td',{class:'num'},
            h('span',{class:'amount '+(x.type==='income'?'pos':'neg')},
              (x.type==='income'?'+':'−')+fmt(x.amount))),
          h('td',{style:'text-align:right;'},
            h('button',{class:'small danger-ghost',
              onclick:()=>{ state.recurring = state.recurring.filter(r=>r.id!==x.id); save(); render(); }},'Remove'))))))
    : h('div',{class:'muted'},'No recurring items yet — add your salary, rent, and subscriptions above.');

  root.append(h('div',{class:'card'},
    h('h2',{},'Recurring monthly items'),
    h('p',{class:'muted'},'The baseline of the forecast: money that reliably arrives or leaves every month.'),
    addRec,
    h('div',{style:'margin-top:10px;'}, recList)));

  // --- assumptions
  const defaultStart = allTimeBalance();
  const rawVarDefault = avgMonthlyExpense(3);
  const defaultVariable = Math.max(0, Math.round(rawVarDefault - recExpense));
  const startVal = fcOpts.startOverride===null ? Math.round(defaultStart) : fcOpts.startOverride;
  const varVal = fcOpts.variableOverride===null ? defaultVariable : fcOpts.variableOverride;

  const startInp = h('input',{type:'number', step:'50', value:startVal,
    onchange:e=>{ fcOpts.startOverride = parseFloat(e.target.value)||0; render(); }});
  const varInp = h('input',{type:'number', min:'0', step:'10', value:varVal,
    onchange:e=>{ fcOpts.variableOverride = Math.max(0,parseFloat(e.target.value)||0); render(); }});
  const horizonSel = h('select',{onchange:e=>{ fcOpts.horizon=parseInt(e.target.value,10); render(); }},
    [6,12,24,36].map(n=>h('option',{value:n}, n+' months')));
  horizonSel.value = String(fcOpts.horizon);

  root.append(h('div',{class:'card'},
    h('h2',{},'Assumptions'),
    h('div',{class:'form-grid'},
      h('div',{class:'field'}, h('label',{},'Starting balance'), startInp),
      h('div',{class:'field'}, h('label',{},'Other variable spending / month'), varInp),
      h('div',{class:'field'}, h('label',{},'Horizon'), horizonSel)),
    h('div',{class:'hint'},
      'Starting balance defaults to your recorded balance ('+fmt0(defaultStart)+'). Variable spending defaults to your last 3 months’ average spending minus recurring expenses'
      + (rawVarDefault ? ' ('+fmt0(rawVarDefault)+' − '+fmt0(recExpense)+')' : '')
      + ', so recurring items aren’t double-counted.')));

  // --- projection
  const net = recIncome - recExpense - varVal;
  const points = [];
  let k = curMonthKey(), bal = startVal;
  points.push({label:'Now', value:bal});
  for(let i=1;i<=fcOpts.horizon;i++){
    k = shiftMonth(k, 1);
    bal += net;
    points.push({label:monthLabel(k, k.endsWith('-01')), value:bal});
  }
  const end = points[points.length-1].value;
  const crossIdx = points.findIndex((p,i)=> i>0 && p.value<0 && points[i-1].value>=0);

  const summary = h('div',{class:'tile-grid'},
    tile('Monthly net (projected)', (net>=0?'+':'−')+fmt0(Math.abs(net)),
      h('div',{class:'muted'}, fmt0(recIncome)+' in − '+fmt0(recExpense)+' recurring − '+fmt0(varVal)+' variable')),
    tile('Balance in '+fcOpts.horizon+' months', fmt0(end),
      deltaEl(end-startVal, true, 'today')),
    tile('Yearly pace', (net>=0?'+':'−')+fmt0(Math.abs(net*12)),
      h('div',{class:'muted'},'net × 12')));

  let callout = null;
  if(crossIdx>0){
    callout = h('div',{class:'callout crit'},
      h('strong',{},'Heads up: '), 'at this pace your balance goes negative around ',
      h('strong',{}, points[crossIdx].label), '. Trim variable spending or add income to push that out.');
  } else if(net<0){
    callout = h('div',{class:'callout'},
      h('strong',{},'Running a deficit: '), 'you’re spending '+fmt0(-net)+' more than you earn each month, but your starting balance covers the horizon shown.');
  } else if(net>0){
    callout = h('div',{class:'callout ok'},
      h('strong',{},'Surplus: '), 'saving '+fmt0(net)+' per month adds '+fmt0(net*12)+' a year at this pace.');
  }

  root.append(h('div',{class:'card viz-card'},
    h('h2',{},'Projected balance'),
    summary,
    lineChart(points, 'Projected balance'),
    callout));
}

/* ============================== sample data ============================== */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function loadSample(){
  const rnd = mulberry32(42);
  const tx = [];
  const push = (mk, day, type, category, amount, desc)=>{
    const [y,m] = mk.split('-').map(Number);
    const last = new Date(y, m, 0).getDate();
    const d = mk + '-' + String(Math.min(day,last)).padStart(2,'0');
    if(d > todayISO()) return;
    tx.push({id:uid()+tx.length, type, category, amount:Math.round(amount*100)/100, date:d, desc});
  };
  const months = lastNMonthKeys(6);
  for(const mk of months){
    push(mk, 1, 'income','Salary', 4200, 'Monthly salary');
    if(rnd()<0.5) push(mk, 15, 'income','Freelance', 300+rnd()*500, 'Side project');
    push(mk, 1, 'expense','Housing', 1400, 'Rent');
    push(mk, 5, 'expense','Utilities', 105+rnd()*50, 'Power + water');
    push(mk, 3, 'expense','Subscriptions', 42, 'Streaming + music');
    for(const day of [4,11,18,25]) push(mk, day, 'expense','Groceries', 75+rnd()*55, 'Supermarket');
    for(let j=0;j<3+Math.floor(rnd()*3);j++) push(mk, 2+Math.floor(rnd()*26), 'expense','Dining out', 14+rnd()*38, 'Eating out');
    push(mk, 8, 'expense','Transport', 60+rnd()*40, 'Fuel / transit pass');
    if(rnd()<0.7) push(mk, 12+Math.floor(rnd()*10), 'expense','Entertainment', 20+rnd()*45, 'Movies / events');
    if(rnd()<0.6) push(mk, 6+Math.floor(rnd()*18), 'expense','Shopping', 30+rnd()*90, 'Odds and ends');
    if(rnd()<0.3) push(mk, 10+Math.floor(rnd()*12), 'expense','Health', 25+rnd()*60, 'Pharmacy');
  }
  state.tx = tx;
  state.budgets = { 'Groceries':500, 'Dining out':220, 'Transport':150, 'Entertainment':120, 'Shopping':200, 'Utilities':180 };
  state.recurring = [
    {id:uid()+'r1', name:'Salary', type:'income', amount:4200},
    {id:uid()+'r2', name:'Rent', type:'expense', amount:1400},
    {id:uid()+'r3', name:'Utilities', type:'expense', amount:130},
    {id:uid()+'r4', name:'Subscriptions', type:'expense', amount:42}
  ];
  save(); render();
}

/* ============================== shell ============================== */
const VIEWS = {
  dashboard: viewDashboard,
  transactions: viewTransactions,
  budgets: viewBudgets,
  calculators: viewCalculators,
  forecast: viewForecast
};
function switchTab(tab){ activeTab = tab; render(); window.scrollTo({top:0}); }
function render(){
  const tabs = document.getElementById('tabs');
  tabs.replaceChildren(...TABS.map(([id,label])=>
    h('button',{class:id===activeTab?'active':'', onclick:()=>switchTab(id)}, label)));
  const view = document.getElementById('view');
  view.replaceChildren();
  VIEWS[activeTab](view);
}

const curSel = document.getElementById('currency-sel');
curSel.replaceChildren(...CURRENCIES.map(c=>h('option',{value:c},c)));
curSel.value = state.settings.currency;
curSel.addEventListener('change', ()=>{ state.settings.currency = curSel.value; save(); render(); });

document.getElementById('reset-btn').addEventListener('click', ()=>{
  if(!confirm('Erase ALL saved transactions, budgets and recurring items? This cannot be undone.')) return;
  localStorage.removeItem(LS_KEY);
  state = blankState();
  editingTxId = null; txFilters = {month:'all', type:'all', q:''};
  budgetMonth = null; fcOpts = {horizon:12, startOverride:null, variableOverride:null};
  curSel.value = state.settings.currency;
  render();
});

render();
</script>
