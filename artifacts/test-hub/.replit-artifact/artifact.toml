kind = "web"
previewPath = "/"
title = "Test Hub"
version = "1.0.0"
id = "artifacts/test-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20977

[services.development]
run = "pnpm --filter @workspace/test-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/test-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/test-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20977"
BASE_PATH = "/"
